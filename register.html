<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register — Royal Rangers Bayelsa</title>
<link rel="stylesheet" href="css.css"/>
</head>
<body class="auth-body">
<div class="auth-container wide">
  <div class="auth-box">
    <div class="auth-logo">
      <img class="app-logo" src="" alt="Logo" style="display:none;height:80px"/>
      <div class="logo-fallback large">RR</div>
    </div>
    <h2>Member Registration</h2>
    <p class="auth-sub">Join the Royal Rangers family — <span class="app-state">Bayelsa State Command</span></p>

    <form id="regForm" enctype="multipart/form-data">
      <div class="form-section-title">Personal Information</div>
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input id="firstName" placeholder="First Name" required/></div>
        <div class="form-group"><label>Last Name *</label><input id="lastName" placeholder="Last Name" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date of Birth</label><input id="dob" type="date"/></div>
        <div class="form-group"><label>Gender</label>
          <select id="gender"><option value="">Select</option><option>Male</option><option>Female</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone Number</label><input id="phone" placeholder="+234 800 000 0000"/></div>
        <div class="form-group"><label>Email Address *</label><input id="regEmail" type="email" placeholder="ranger@email.com" required/></div>
      </div>
      <div class="form-group"><label>Residential Address</label><input id="address" placeholder="Full Address"/></div>

      <div class="form-section-title">Church & Rangers Information</div>
      <div class="form-row">
        <div class="form-group"><label>Local Church</label><input id="church" placeholder="Church Name"/></div>
        <div class="form-group"><label>District *</label>
          <select id="district" required>
            <option value="">Select District</option>
            <option>Bayelsa North</option>
            <option>Bayelsa East</option>
            <option>Bayelsa Central</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Outpost</label><input id="outpost" placeholder="Outpost Name"/></div>
        <div class="form-group"><label>Current Rank</label>
          <select id="rank">
            <option>Lance Corporal</option>
            <option>Corporal</option>
            <option>Sergeant</option>
            <option>Staff Sergeant</option>
            <option>Warrant Officer</option>
            <option>Master Warrant Officer</option>
            <option>Second Lieutenant</option>
            <option>Lieutenant</option>
            <option>Captain</option>
            <option>Major</option>
            <option>Lieutenant Colonel</option>
            <option>Colonel</option>
            <option>Brigadier General</option>
            <option>Major General</option>
            <option>Lieutenant General</option>
            <option>General</option>
          </select>
        </div>
      </div>

      <div class="form-section-title">Emergency Contact</div>
      <div class="form-row">
        <div class="form-group"><label>Emergency Contact Name</label><input id="ecName" placeholder="Full Name"/></div>
        <div class="form-group"><label>Emergency Contact Phone</label><input id="ecPhone" placeholder="+234 800 000 0000"/></div>
      </div>

      <div class="form-section-title">Profile Photo & Security</div>
      <div class="form-group">
        <label>Profile Photo (optional)</label>
        <div class="photo-upload-box" onclick="document.getElementById('photoFile').click()">
          <img id="photoPreview" src="" style="display:none;width:80px;height:80px;border-radius:50%;object-fit:cover"/>
          <div id="photoPlaceholder">&#128247; Click to upload photo</div>
          <input id="photoFile" type="file" accept="image/*" style="display:none" onchange="previewPhoto(this)"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password *</label>
          <div class="pw-wrap"><input id="regPw" type="password" placeholder="Min 6 characters" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('regPw')">&#128065;</button></div>
        </div>
        <div class="form-group"><label>Confirm Password *</label>
          <div class="pw-wrap"><input id="regPw2" type="password" placeholder="Repeat password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('regPw2')">&#128065;</button></div>
        </div>
      </div>

      <div class="form-group terms-check">
        <label><input type="checkbox" id="agreeTerms" required/> I agree to the Royal Rangers Code of Conduct and Terms of Membership</label>
      </div>

      <div id="regError" class="error-msg" style="display:none"></div>
      <div id="regSuccess" class="success-msg" style="display:none"></div>
      <button type="submit" class="btn btn-red btn-full" id="regBtn">Complete Registration</button>
    </form>
    <p class="auth-switch">Already registered? <a href="login.html">Login Here</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script>
initFirebase(); loadAppConfig();
// NOTE: Deliberately NOT redirecting on auth state change here.
// Registration creates the auth session immediately, but we must let
// registerMember() finish writing to Firestore (membership ID, member
// document, public_verify record) BEFORE navigating anywhere. The
// registration form's own submit handler controls the redirect instead.

function previewPhoto(input) {
  if (input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById("photoPreview").src = e.target.result;
      document.getElementById("photoPreview").style.display = "block";
      document.getElementById("photoPlaceholder").style.display = "none";
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === "password" ? "text" : "password";
}

document.getElementById("regForm").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("regError");
  const sucEl = document.getElementById("regSuccess");
  const btn = document.getElementById("regBtn");
  errEl.style.display = "none"; sucEl.style.display = "none";

  const pw = document.getElementById("regPw").value;
  const pw2 = document.getElementById("regPw2").value;
  if (pw !== pw2) { errEl.textContent = "Passwords do not match."; errEl.style.display = "block"; return; }

  btn.disabled = true; btn.textContent = "Registering...";
  try {
    const formData = {
      email: document.getElementById("regEmail").value.trim(),
      password: pw,
      firstName: document.getElementById("firstName").value.trim(),
      lastName: document.getElementById("lastName").value.trim(),
      dob: document.getElementById("dob").value,
      gender: document.getElementById("gender").value,
      phone: document.getElementById("phone").value.trim(),
      address: document.getElementById("address").value.trim(),
      church: document.getElementById("church").value.trim(),
      outpost: document.getElementById("outpost").value.trim(),
      district: document.getElementById("district").value,
      rank: document.getElementById("rank").value,
      ecName: document.getElementById("ecName").value.trim(),
      ecPhone: document.getElementById("ecPhone").value.trim()
    };
    const photo = document.getElementById("photoFile").files[0] || null;
    const { membershipID } = await registerMember(formData, photo);
    sucEl.innerHTML = `&#10003; Registration successful! Your Membership ID is <strong>${membershipID}</strong>.<br/>Please check your email for a verification link. Await admin approval.`;
    sucEl.style.display = "block";
    e.target.reset();
    setTimeout(() => window.location.href = "login.html", 5000);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
    btn.disabled = false; btn.textContent = "Complete Registration";
  }
});
</script>
</body>
</html>
