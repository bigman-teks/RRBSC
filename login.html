
<!-- ============================================================
     LOGIN.HTML  (save as separate file — paste below into login.html)
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Royal Rangers Bayelsa</title>
<link rel="stylesheet" href="css.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <img class="app-logo" src="" alt="Logo" style="display:none;height:80px;margin-bottom:8px"/>
      <div class="logo-fallback large">RR</div>
    </div>
    <h2>Member Login</h2>
    <p class="auth-sub app-state">Bayelsa State Command</p>

    <!-- Firebase config check banner -->
    <div id="configWarning" style="display:none;background:#FFF3CD;border:1.5px solid #FFCC00;border-radius:8px;padding:12px;font-size:13px;color:#856404;margin-bottom:16px">
      &#9888; Firebase is not configured. Open <strong>assets/js/firebase-config.js</strong> and paste your Firebase project credentials.
    </div>

    <div class="form-tabs">
      <button class="tab-btn active" onclick="switchTab(this)">Member</button>
      <button class="tab-btn" onclick="switchTab(this)">Admin</button>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input id="loginEmail" type="email" placeholder="ranger@email.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword')" tabindex="-1">&#128065;</button>
        </div>
      </div>
      <div class="form-row-check">
        <label><input type="checkbox" id="rememberMe"/> Remember me</label>
        <a href="#" onclick="showForgotModal(); return false;">Forgot Password?</a>
      </div>

      <div id="loginError" style="display:none;background:#FDEDEC;border:1.5px solid #E74C3C;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px"></div>

      <button type="submit" class="btn btn-blue btn-full" id="loginBtn">Login</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="register.html">Register Now</a></p>
  </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal" style="display:none">
  <div class="modal-box" style="max-width:400px">
    <h3>&#128274; Reset Password</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Enter the email address linked to your account and we'll send a reset link.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="ranger@email.com"/>
    </div>
    <div id="resetMsg" style="margin-bottom:12px;font-size:13px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-blue" onclick="doReset()">Send Reset Link</button>
      <button class="btn btn-outline-dark" onclick="document.getElementById('forgotModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script>

// ── Init ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  try {
    initFirebase();
    loadAppConfig().catch(() => {});

    // Check if config is still placeholder
    if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("YOUR_")) {
      document.getElementById("configWarning").style.display = "block";
      document.getElementById("loginBtn").disabled = true;
      return;
    }

    // Redirect if already logged in
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      try {
        const data = await getCurrentUserData();
        redirectByRole(data);
      } catch(e) {}
    });

  } catch (err) {
    document.getElementById("configWarning").style.display = "block";
    document.getElementById("configWarning").textContent =
      "⚠ Firebase failed to initialize: " + err.message;
    document.getElementById("loginBtn").disabled = true;
  }
});

// ── Login ─────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const errEl  = document.getElementById("loginError");
  const btn    = document.getElementById("loginBtn");
  const email  = document.getElementById("loginEmail").value.trim();
  const pw     = document.getElementById("loginPassword").value;

  errEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Logging in…";

  try {
    // Persistence
    const remember = document.getElementById("rememberMe").checked;
    await auth.setPersistence(
      remember
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION
    );

    const userData = await loginMember(email, pw);
    redirectByRole(userData);

  } catch (err) {
    errEl.innerHTML = "&#10006; " + friendlyError(err);
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Login";
  }
}

// ── Role redirect ─────────────────────────────────────────
async function redirectByRole(data) {
  if (!data) data = await getCurrentUserData();
  if (!data) { window.location.href = "dashboard.html"; return; }
  const adminRoles = ["super_admin","state_admin","district_admin","outpost_admin"];
  window.location.href = adminRoles.includes(data.role) ? "admin.html" : "dashboard.html";
}

// ── Friendly errors ───────────────────────────────────────
function friendlyError(err) {
  const code = err.code || "";
  const map = {
    "auth/user-not-found":
      "No account found with this email. <a href='register.html'>Register here</a>.",
    "auth/wrong-password":
      "Incorrect password. Please try again or reset your password.",
    "auth/invalid-email":
      "Please enter a valid email address.",
    "auth/invalid-credential":
      "Email or password is incorrect. Please check and try again.",
    "auth/too-many-requests":
      "Too many failed attempts. Your account is temporarily locked. Try again later or reset your password.",
    "auth/user-disabled":
      "This account has been disabled. Contact the State Administrator.",
    "auth/network-request-failed":
      "Network error. Please check your internet connection and try again.",
    "auth/operation-not-allowed":
      "Email/Password login is not enabled. Contact the administrator.",
    "auth/configuration-not-found":
      "Firebase is not configured correctly. Please paste your Firebase config into firebase-config.js.",
  };
  return map[code] || (err.message ? "Error: " + err.message : "An unexpected error occurred. Please try again.");
}

// ── Password reset ────────────────────────────────────────
async function doReset() {
  const email = document.getElementById("resetEmail").value.trim();
  const msgEl = document.getElementById("resetMsg");
  msgEl.innerHTML = "";
  if (!email) {
    msgEl.innerHTML = '<span class="error-msg">Please enter your email address.</span>';
    return;
  }
  try {
    await resetPassword(email);
    msgEl.innerHTML = '<span class="success-msg">&#10003; Reset link sent! Check your inbox (and spam folder).</span>';
  } catch (e) {
    msgEl.innerHTML = '<span class="error-msg">' + friendlyError(e) + '</span>';
  }
}

// ── Helpers ───────────────────────────────────────────────
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === "password" ? "text" : "password";
}
function switchTab(btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
function showForgotModal() {
  document.getElementById("resetEmail").value =
    document.getElementById("loginEmail").value;
  document.getElementById("resetMsg").innerHTML = "";
  document.getElementById("forgotModal").style.display = "flex";
}
</script>
</body>
</html>
